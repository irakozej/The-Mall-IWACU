name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, queue subsequent runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compute base path
        id: base
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          # User/Org pages live at <owner>.github.io with no base path.
          # Project pages live at <owner>.github.io/<repo>/ — base path is /<repo>.
          if [ "$REPO" = "${OWNER_LOWER}.github.io" ]; then
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "url=https://${OWNER_LOWER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${REPO}" >> "$GITHUB_OUTPUT"
            echo "url=https://${OWNER_LOWER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.base }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.base.outputs.url }}
        run: npm run build

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
