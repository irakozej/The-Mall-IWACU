name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, queue subsequent runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Compute base path
        id: base
        env:
          # Repo variable (Settings → Secrets and variables → Actions →
          # Variables). When set to e.g. `themalliwacu.rw`, the site builds
          # for that domain at the root path and a CNAME file is emitted.
          # Leave unset to keep deploying to <owner>.github.io/<repo>/.
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LOWER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          if [ -n "$CUSTOM_DOMAIN" ]; then
            # Custom domain — site lives at the domain root.
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "url=https://${CUSTOM_DOMAIN}" >> "$GITHUB_OUTPUT"
          elif [ "$REPO" = "${OWNER_LOWER}.github.io" ]; then
            # User/Org pages live at <owner>.github.io with no base path.
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "url=https://${OWNER_LOWER}.github.io" >> "$GITHUB_OUTPUT"
          else
            # Project pages live at <owner>.github.io/<repo>/ — base path is /<repo>.
            echo "base=/${REPO}" >> "$GITHUB_OUTPUT"
            echo "url=https://${OWNER_LOWER}.github.io/${REPO}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.base.outputs.base }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.base.outputs.url }}
          # Supabase project for live bookings. The anon key is public by
          # design — it ships in the browser bundle and RLS is what protects
          # the data — so committing it here is safe. Repo secrets, if set,
          # still take precedence (e.g. after rotating the key).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://amjamsuknlmnwdjzjwjx.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFtamFtc3Vrbmxtbndkanpqd2p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxMzA4NDksImV4cCI6MjA5NDcwNjg0OX0.Rk3YUCuqElV4bQ06kGZ_t6NuP6s4bquUb0IjXntNCWU' }}
        run: npm run build

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - name: Emit CNAME for custom domain
        if: vars.CUSTOM_DOMAIN != ''
        run: echo "${{ vars.CUSTOM_DOMAIN }}" > out/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
